name: sqlite-simple-effectful
version: 0.1.0.0
github: 'dcastro/sqlite-simple-effectful'
license: BSD-3-Clause
author: 'Diogo Castro'
maintainer: 'dc@diogocastro.com'
copyright: '2026 Diogo Castro'
category: Database

tested-with: GHC == 9.6.7
  , GHC == 9.8.4
  , GHC == 9.10.3
  , GHC == 9.12.4
  , GHC == 9.14.1

extra-source-files:
  - README.md
extra-doc-files:
  - CHANGELOG.md

synopsis: Adaptation of the sqlite-simple library for the effectful ecosystem.
description: Adaptation of the @<https://hackage.haskell.org/package/sqlite-simple sqlite-simple>@ library for the @<https://hackage.haskell.org/package/effectful effectful>@ ecosystem.

default-extensions:
  - BlockArguments
  - StrictData
  - TypeFamilies
  - ImportQualifiedPost
  - RankNTypes
  - LambdaCase
  - TypeOperators
  - DataKinds
  - NamedFieldPuns
  - TypeApplications
  - GADTs
  - FlexibleContexts
  - PolyKinds
  - ScopedTypeVariables
  - NumericUnderscores

ghc-options:
  - -Weverything
  - -Wno-name-shadowing
  - -Wno-missing-exported-signatures
  - -Wno-missing-import-lists
  - -Wno-missing-export-lists
  - -Wno-missed-specialisations
  - -Wno-all-missed-specialisations
  - -Wno-unsafe
  - -Wno-safe
  - -Wno-missing-local-signatures
  - -Wno-monomorphism-restriction
  - -Wno-implicit-prelude
  - -Wno-prepositive-qualified-module
  - -Wno-missing-safe-haskell-mode
  - -Wno-missing-kind-signatures
when:
  - condition: impl(ghc >= 9.8.1)
    ghc-options:
      - -Wno-missing-role-annotations

library:
  source-dirs: src
  dependencies:
    - base < 5
    - effectful >= 2.4.0.0
    - effectful-core >= 2.4.0.0
    - sqlite-simple >= 0.4.19.0
    - unliftio-pool >= 0.4.2.0
    - text >= 1.2.5.0

executables:
  sqlite-simple-effectful-examples:
    main: Examples.hs
    source-dirs: examples
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - base
      - effectful
      - effectful-core
      - sqlite-simple
      - sqlite-simple-effectful
      - async
      - temporary
